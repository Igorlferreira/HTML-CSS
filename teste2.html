<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabuada</title>
</head>
<body>
    <script>
    function pulalinha(){
        document.write("<br>");
        document.write("<br>");}
    function mostra(frase){
        document.write(frase);
        pulalinha();}
var numerotabuada=parseInt(prompt("Digite um numero e veja ele sendo multiplicado até 10"));
var x = numerotabuada
function tabuada (){
    mostra(numerotabuada + " vezes 1 = "+ 1*x);
    mostra(numerotabuada + " vezes 2 = "+ 2*x);
    mostra(numerotabuada + " vezes 3 = "+ 3*x);
    mostra(numerotabuada + " vezes 4 = "+ 4*x);
    mostra(numerotabuada + " vezes 5 = "+ 5*x);
    mostra(numerotabuada + " vezes 6 = "+ 6*x);
    mostra(numerotabuada + " vezes 7 = "+ 7*x);
    mostra(numerotabuada + " vezes 8 = "+ 8*x);
    mostra(numerotabuada + " vezes 9 = "+ 9*x);
    mostra(numerotabuada + " vezes 10 = "+ 10*x);}
    mostra(tabuada());
    </script>
    
</body>
</html>
