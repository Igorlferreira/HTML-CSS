<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tarefa</title>
</head>
<body>
    <form method="get">
        <fieldset>
            <legend>Dados do paciente</legend>
            Nome do paciente: <input type="text" name="Nome"><br>
            Registro hospitalar: <input type="text" name="Registro"><br>
            Data de inclusão: <input type="date" name="inclusão"><br>
            Data de nascimento <input type="date" name="nascimento"><br>
            Email do paciente <input type="email" name="email"><br>
            Gênero <br>
            <input type="radio" name="genero" value="1">masculino<br>
            <input type="radio" name="genero" value="2">feminino<br>
            <input type="radio" name="genero" value="3">prefiro não especificar<br>
            Raça declarada<br>
            <select name="raca">
                <option value=""></option>
                <option value="1">Branca</option>
                <option value="2">Negra</option>
                <option value="3">Parda</option>
                <option value="4">Amarela</option>
            </select>
            <br>
            Como ficou sabendo da pesquisa?<br>
            <input type="checkbox" name="estudo" value="Panfleto">Panfleto
            <br>
            <input type="checkbox" name="estudo" value="internet">Internet
            <br>
            <input type="checkbox" name="estudo" value="amigos">Amigos
            <br>
            <button type="submit">Enviar</button>
        </fieldset>




    </form>


    
</body>
</html>
